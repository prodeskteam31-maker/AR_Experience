<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>AR Experience - Telemly & El Biar</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Interface haute : logos et titre */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            z-index: 30;
            pointer-events: none; /* pour ne pas gêner les interactions 3D */
        }
        .logo-left, .logo-right {
            flex-shrink: 0;
            background: transparent; /* fond totalement transparent */
            border-radius: 0;
            padding: 0;
            backdrop-filter: none;
        }
        .logo-left img, .logo-right img {
            height: 50px;
            width: auto;
            display: block;
            object-fit: contain;
        }
        .title {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            padding: 8px 20px;
            border-radius: 12px; /* rectangle aux angles légèrement arrondis */
            text-align: center;
            color: white;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            flex: 1;
            white-space: nowrap;
            overflow-x: auto;
            font-family: inherit;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        /* Étiquette en bas : bandeau rectangulaire large */
        .bottom-label {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 12px; /* légèrement arrondi mais pas rond */
            color: white;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.5;
            text-align: center;
            z-index: 30;
            pointer-events: none;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: calc(100% - 40px);
            margin: 0 auto;
            font-family: inherit;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: #ddd;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            z-index: 30;
            pointer-events: none;
            font-family: monospace;
        }
        /* Responsive */
        @media (max-width: 700px) {
            .logo-left img, .logo-right img { height: 35px; }
            .title { font-size: 10px; padding: 6px 12px; white-space: normal; }
            .bottom-label { font-size: 11px; padding: 8px 14px; bottom: 12px; left: 12px; right: 12px; }
            #controls-hint { font-size: 8px; bottom: 12px; right: 12px; }
        }
        @media (max-width: 480px) {
            .logo-left img, .logo-right img { height: 28px; }
            .title { font-size: 8px; }
            .bottom-label { font-size: 10px; }
        }
    </style>
</head>
<body>
    <!-- Barre supérieure : logo gauche, titre, logo droit -->
    <div class="top-bar">
        <div class="logo-left">
            <img src="./models/logo.jpg" alt="Logo" onerror="this.style.display='none'">
        </div>
        <div class="title">
            🔬 Projet de surveillance du glissement de terrain<br>📍 El Biar & Telemly – InSAR + Lasergrammétrie 3D
        </div>
        <div class="logo-right">
            <img src="./models/Faro_s150.jpg" alt="Faro s150" onerror="this.style.display='none'">
        </div>
    </div>

    <div id="controls-hint">
        🖱️ 1 doigt = rotation | 2 doigts = zoom
    </div>

    <!-- Étiquette en bas (bandeau rectangulaire) -->
    <div class="bottom-label">
        📐 Projet portant surveillance du phénomène de glissement de terrain au niveau d'El Biar et Telemly à l'aide de l'outil spatial afin de prévenir les dangers.
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Scène avec image de fond (haute qualité)
        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader();
        // Chargement sans compression excessive (Three.js applique par défaut le mipmapping, mais l'image source reste intacte)
        const backgroundTexture = textureLoader.load('./models/Telemly.jpg');
        backgroundTexture.minFilter = THREE.LinearFilter; // éviter l'aliasing
        backgroundTexture.magFilter = THREE.LinearFilter;
        scene.background = backgroundTexture;

        // Caméra : recul pour réduire la taille apparente du modèle (dézoom)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        // Augmente encore la distance pour que le modèle paraisse plus petit
        camera.position.set(4, 3, 6);  // plus éloigné
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Contrôles
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;
        controls.zoomSpeed = 1.0;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.touchRotate = true;
        controls.touchZoom = true;

        // Éclairage amélioré
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.DirectionalLight(0x88aaff, 0.4);
        fillLight.position.set(-2, 1, -3);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0xffaa66, 0.5);
        rimLight.position.set(1, 2, -2);
        scene.add(rimLight);

        // Chargement du modèle 3D
        const modelPath = './models/mon-modele.glb'; // <-- ton modèle de 17 Mo
        const loader = new GLTFLoader();
        let model = null;

        loader.load(modelPath,
            (gltf) => {
                model = gltf.scene;
                scene.add(model);
                // Optionnel : réduire l'échelle du modèle lui-même (en complément du recul)
                // model.scale.set(0.7, 0.7, 0.7);
                console.log('Modèle 3D chargé');
            },
            (xhr) => {
                console.log(`${Math.round(xhr.loaded / xhr.total * 100)}%`);
            },
            (error) => {
                console.error('Erreur chargement modèle :', error);
            }
        );

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
