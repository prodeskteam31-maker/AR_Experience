<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Projet Telemly - Modèle 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 20;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: #ccc;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        🔬 Projet Telemly - Surveillance glissement de terrain<br>
        📦 Modèle laser 3D - Pinch/doigt pour zoom/rotation
    </div>
    <div id="controls-hint">
        🖱️ Un doigt = rotation | Deux doigts = zoom
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 1. Scène, caméra, renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // fond sobre

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 1.5, 3);
        camera.lookAt(0, 0, 0);

        // Renderer pour le modèle 3D
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Renderer pour l'étiquette texte (toujours face caméra)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- 2. Contrôles interactifs ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;      // inertie
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.touchRotate = true;
        controls.touchZoom = true;

        // --- 3. Éclairage (pour bien voir le modèle) ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 5, 3);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0x88aaff, 0.5);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(0, -1, 0);
        scene.add(fillLight);

        // Optionnel : une grille au sol pour le repère (décommente si besoin)
        // const gridHelper = new THREE.GridHelper(5, 20, 0x888888, 0x444444);
        // scene.add(gridHelper);

        // --- 4. Chargement du modèle GLB local ---
        // Remplace 'mon-modele.glb' par le NOM EXACT de ton fichier
        const modelPath = './models/mon-modele.glb';
        const loader = new GLTFLoader();
        
        let model; // pour garder une référence

        loader.load(modelPath,
            (gltf) => {
                model = gltf.scene;
                scene.add(model);
                // Ajuster la position/échelle si nécessaire
                // model.position.set(0, -0.5, 0);
                // model.scale.set(0.8, 0.8, 0.8);
                console.log('Modèle chargé avec succès');
            },
            (xhr) => {
                // Progression (optionnel)
                console.log((xhr.loaded / xhr.total * 100) + '% chargé');
            },
            (error) => {
                console.error('Erreur de chargement du modèle :', error);
                document.getElementById('info').innerHTML += '<br>⚠️ Modèle introuvable. Vérifie le chemin.';
            }
        );

        // --- 5. Étiquette texte en CSS2D (petite pancarte toujours face caméra) ---
        const div = document.createElement('div');
        div.textContent = '📐 Scanner laser 3D - Telemly';
        div.style.color = 'white';
        div.style.backgroundColor = 'rgba(0,0,0,0.7)';
        div.style.padding = '6px 12px';
        div.style.borderRadius = '20px';
        div.style.fontSize = '16px';
        div.style.fontWeight = 'bold';
        div.style.fontFamily = 'sans-serif';
        div.style.border = '1px solid #ffaa00';
        div.style.backdropFilter = 'blur(4px)';
        div.style.whiteSpace = 'nowrap';
        
        const labelObj = new CSS2DObject(div);
        labelObj.position.set(0, 1.2, 0); // place l'étiquette au-dessus du modèle (ajuster selon la taille)
        scene.add(labelObj);
        
        // Si tu veux que l'étiquette suive le modèle (si le modèle bouge), il faudra l'attacher en tant qu'enfant.
        // Mais ici, modèle et étiquette sont tous deux fixes dans la scène.

        // --- 6. Animation boucle ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // met à jour les interactions
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        // Gestion du redimensionnement de la fenêtre
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
