<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>🔬 Projet de surveillance du glissement de terrain<br> 
        📍 El Biar & Telemly – InSAR + Lasergrammétrie 3D </title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Conteneur des éléments de l'interface (haut et bas fixes) */
        .ui-top {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 30;
            gap: 10px;
            pointer-events: none; /* Pour ne pas bloquer les interactions 3D */
        }
        .logo-left, .logo-right {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 6px;
            backdrop-filter: blur(4px);
            pointer-events: auto; /* au cas où on veut cliquer plus tard */
        }
        .logo-left img, .logo-right img {
            height: 50px;
            width: auto;
            display: block;
        }
        .title-center {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 40px;
            text-align: center;
            color: white;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.4;
            flex: 1;
            margin: 0 10px;
            pointer-events: none;
            white-space: nowrap;
            overflow-x: auto;
        }
        .title-center span {
            display: inline-block;
        }
        /* Étiquette fixe en bas (modifiée) */
        .ar-label {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,215,0,0.5);
            max-width: 85%;
            white-space: normal;
            word-break: break-word;
            z-index: 30;
            pointer-events: none;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            line-height: 1.5;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: #ccc;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 10px;
            z-index: 30;
            pointer-events: none;
        }
        @media (max-width: 700px) {
            .logo-left img, .logo-right img { height: 35px; }
            .title-center { font-size: 9px; padding: 4px 12px; white-space: normal; }
            .ar-label { font-size: 10px; padding: 6px 14px; bottom: 12px; }
            #controls-hint { font-size: 8px; bottom: 12px; right: 12px; }
        }
        @media (max-width: 480px) {
            .logo-left img, .logo-right img { height: 28px; }
            .title-center { font-size: 8px; }
        }
    </style>
</head>
<body>
    <!-- Interface haute : logo gauche, titre centré, logo droit -->
    <div class="ui-top">
        <div class="logo-left">
            <img src="./models/logo.jpg" alt="Logo" onerror="this.style.display='none'">
        </div>
        <div class="title-center">
            <span>🔬 Projet de surveillance du glissement de terrain<br>📍 El Biar & Telemly – InSAR + Lasergrammétrie 3D</span>
        </div>
        <div class="logo-right">
            <img src="./models/Faro_s150.jpg" alt="Faro s150" onerror="this.style.display='none'">
        </div>
    </div>

    <div id="controls-hint">
        🖱️ Un doigt = rotation | Deux doigts = zoom
    </div>

    <!-- Nouvelle étiquette basse (texte modifié) -->
    <div class="ar-label">
        📐 Projet portant surveillance du phénomène de glissement de terrain au niveau d'El Biar et Telemly à l'aide de l'outil spatial afin de prévenir les dangers.
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Scène avec fond personnalisé (Telemly.jpg)
        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader();
        scene.background = textureLoader.load('./models/Telemly.jpg');

        // Caméra dézoomée
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3.5, 2.5, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Contrôles interactifs
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.touchRotate = true;
        controls.touchZoom = true;

        // Éclairage (pour bien voir le modèle)
        const ambientLight = new THREE.AmbientLight(0xcccccc);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 5, 3);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0x88aaff, 0.4);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0x4466cc, 0.2);
        fillLight.position.set(0, -1, 0);
        scene.add(fillLight);

        // Chargement du modèle 3D (17 Mo)
        const modelPath = './models/mon-modele.glb';
        const loader = new GLTFLoader();
        let model = null;

        loader.load(modelPath,
            (gltf) => {
                model = gltf.scene;
                scene.add(model);
                console.log('Modèle 3D chargé');
            },
            (xhr) => {
                console.log(`${Math.round(xhr.loaded / xhr.total * 100)}%`);
            },
            (error) => {
                console.error('Erreur chargement modèle :', error);
                // Afficher un message dans la console mais pas d'alerte intrusive
            }
        );

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
