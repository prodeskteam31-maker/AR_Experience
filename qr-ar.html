<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>AR Experience - Telemly & El Biar</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ── BARRE SUPÉRIEURE ── */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            z-index: 30;
            pointer-events: none;
        }

        /* LOGOS : grands, transparents, directement sur fond image */
        .logo-left, .logo-right {
            flex-shrink: 0;
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            box-shadow: none;
            backdrop-filter: none;
        }
        .logo-left img, .logo-right img {
            height: 80px;
            width: auto;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
        }

        /* TITRE : grand, lisible, SANS boîte */
        .title {
            flex: 1;
            text-align: center;
            color: #ffffff;
            font-size: 16px;
            font-weight: 800;
            line-height: 1.5;
            letter-spacing: 0.4px;
            text-shadow:
                0 0 18px rgba(0,0,0,1),
                0 2px 10px rgba(0,0,0,0.95),
                0 0 4px rgba(0,0,0,1),
                1px 1px 0px rgba(0,0,0,0.8);
            background: none;
            padding: 0;
        }

        /* ÉTIQUETTE BAS */
        .bottom-label {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.5;
            text-align: center;
            z-index: 30;
            pointer-events: none;
            border: 1px solid rgba(255, 215, 0, 0.35);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #controls-hint {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: #ddd;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            z-index: 30;
            pointer-events: none;
            font-family: monospace;
        }

        @media (max-width: 700px) {
            .logo-left img, .logo-right img { height: 55px; }
            .title { font-size: 12px; }
            .bottom-label { font-size: 11px; padding: 8px 14px; bottom: 12px; left: 12px; right: 12px; }
        }
        @media (max-width: 480px) {
            .logo-left img, .logo-right img { height: 40px; }
            .title { font-size: 10px; }
            .bottom-label { font-size: 10px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo-left">
            <img src="./models/logo.jpg" alt="Logo" onerror="this.style.display='none'">
        </div>
        <div class="title">
            🔬 Projet de surveillance du glissement de terrain<br>
            📍 El Biar & Telemly – InSAR + Lasergrammétrie 3D
        </div>
        <div class="logo-right">
            <img src="./models/Faro_s150.png" alt="Faro s150" onerror="this.style.display='none'">
        </div>
    </div>

    <div id="controls-hint">🖱️ 1 doigt = rotation | 2 doigts = zoom</div>

    <div class="bottom-label">
        📐 Projet portant surveillance du phénomène de glissement de terrain au niveau d'El Biar et Telemly à l'aide de l'outil spatial afin de prévenir les dangers.
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ── SCÈNE ──
        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader();
        const backgroundTexture = textureLoader.load('./models/Telemly.jpg');
        backgroundTexture.minFilter = THREE.LinearFilter;
        backgroundTexture.magFilter = THREE.LinearFilter;
        scene.background = backgroundTexture;

        // ── CAMÉRA : éloignée = modèle petit au départ ──
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 14);
        camera.lookAt(0, 0.5, 0);

        // ── RENDERER ──
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // ── CONTRÔLES ──
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0.5, 0);   // orbite centrée, légèrement montée
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;
        controls.zoomSpeed = 1.0;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.update();

        // ── ÉCLAIRAGE ──
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.DirectionalLight(0x88aaff, 0.4);
        fillLight.position.set(-2, 1, -3);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0xffaa66, 0.5);
        rimLight.position.set(1, 2, -2);
        scene.add(rimLight);

        // ── CHARGEMENT DU MODÈLE ──
        const loader = new GLTFLoader();
        loader.load('./models/mon-modele.glb',
            (gltf) => {
                const model = gltf.scene;

                // 1. Centrer sur l'origine
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size   = box.getSize(new THREE.Vector3());
                model.position.sub(center);

                // 2. Échelle réduite → petit au départ
                model.scale.set(0.35, 0.35, 0.35);

                // 3. Remonter le modèle (Y + 20% de sa hauteur après scale)
                model.position.y += size.y * 0.35 * 0.20;

                scene.add(model);
                console.log('Modèle chargé ✓');
            },
            (xhr) => {
                if (xhr.total) console.log(`${Math.round(xhr.loaded / xhr.total * 100)}%`);
            },
            (error) => {
                console.error('Erreur chargement modèle :', error);
            }
        );

        // ── ANIMATION ──
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // ── RESIZE ──
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
