<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>AR Experience - Telemly & El Biar</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.6); color: white;
            padding: 8px 16px; border-radius: 30px;
            font-size: 14px; z-index: 20; backdrop-filter: blur(4px);
            pointer-events: none;
            max-width: 80%;
        }
        #controls-hint {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.5); color: #ccc;
            padding: 6px 12px; border-radius: 20px;
            font-size: 12px; z-index: 20; pointer-events: none;
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; top: 10px; left: 10px; }
            #controls-hint { font-size: 9px; }
        }
    </style>
</head>
<body>
    <div id="info">
        🔬 Projet de surveillance du glissement de terrain<br>
        📍 El Biar & Telemly – InSAR + Lasergrammétrie 3D
    </div>
    <div id="controls-hint">
        🖱️ Un doigt = rotation | Deux doigts = zoom / déplacement
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 1.5, 3);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.touchRotate = true;
        controls.touchZoom = true;

        // Éclairage
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 5, 3);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0x88aaff, 0.5);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(0, -1, 0);
        scene.add(fillLight);

        // --- Chargement du modèle GLB depuis le dossier local (modèle de 17 Mo) ---
        const modelPath = './models/mon-modele.glb';  // ← Remplace par le nom exact de ton fichier 17 Mo
        const loader = new GLTFLoader();
        let model = null;

        loader.load(modelPath,
            (gltf) => {
                model = gltf.scene;
                scene.add(model);
                // Ajuste l'échelle ou la position si nécessaire
                // model.scale.set(0.8, 0.8, 0.8);
                // model.position.set(0, -0.5, 0);
                console.log('Modèle 3D chargé avec succès');
            },
            (xhr) => {
                console.log(`${Math.round(xhr.loaded / xhr.total * 100)}% du modèle chargé`);
            },
            (error) => {
                console.error('Erreur de chargement du modèle :', error);
                document.getElementById('info').innerHTML += '<br>⚠️ Modèle introuvable. Vérifie le chemin.';
            }
        );

        // Étiquette texte longue
        const div = document.createElement('div');
        div.textContent = '📐 Projet portant surveillance du glissement de terrain au niveau d\'El Biar et Telemly par techniques de géodésie spatiale (InSAR) et de Lasergrammétrie Terrestre 3D';
        div.style.color = 'white';
        div.style.backgroundColor = 'rgba(0,0,0,0.8)';
        div.style.padding = '8px 16px';
        div.style.borderRadius = '20px';
        div.style.fontSize = '14px';
        div.style.fontWeight = 'bold';
        div.style.fontFamily = 'sans-serif';
        div.style.border = '1px solid #ffaa00';
        div.style.backdropFilter = 'blur(4px)';
        div.style.maxWidth = '300px';
        div.style.textAlign = 'center';
        div.style.lineHeight = '1.4';
        div.style.whiteSpace = 'normal';
        div.style.wordBreak = 'break-word';
        
        const labelObj = new CSS2DObject(div);
        labelObj.position.set(0, 1.5, 0);
        scene.add(labelObj);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
